# Template Sensors
- sensor:
    - name: Current Date
      state: >
        {% set days = ["st", "nd", "rd"] %}
        {% set day = now().day %}
        {{ now().strftime('%A ') }}{{ day }}{{ days[day-1] if day in range(1, 4)
        and day not in range(11, 14) else 'th' }} {{ now().strftime('%B %Y') }}
    - name: Current Time
      state: "{{ now().strftime('%H:%M') }}"

# Wrappers around the legacy iperf3 integration sensors so they show up
# in the entity registry (and thus in mushroom-strategy area views).
- sensor:
    - name: "Internet Download Capacity"
      unique_id: internet_download_capacity
      unit_of_measurement: "Mbit/s"
      device_class: data_rate
      state_class: measurement
      icon: mdi:download-network
      state: "{{ states('sensor.download_speedtest_serverius_net') }}"
      availability: "{{ has_value('sensor.download_speedtest_serverius_net') }}"
    - name: "Internet Upload Capacity"
      unique_id: internet_upload_capacity
      unit_of_measurement: "Mbit/s"
      device_class: data_rate
      state_class: measurement
      icon: mdi:upload-network
      state: "{{ states('sensor.upload_speedtest_serverius_net') }}"
      availability: "{{ has_value('sensor.upload_speedtest_serverius_net') }}"
