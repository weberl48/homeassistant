dial_menu_confirm:
  alias: 'Speakeasy: Dial menu dispatch'
  icon: mdi:menu
  fields:
    screen:
      description: Screen index (1=movie, 2=music, 3=retro, 4=pc)
      example: 1
    item:
      description: Selected menu index
      example: 0
  sequence:
  - choose:
    - conditions: '{{ screen|int == 1 and item|int == 0 }}'
      sequence:
      - service: script.speakeasy_movie
    - conditions: '{{ screen|int == 1 and item|int == 1 }}'
      sequence:
      - service: script.shield_open_stremio
    - conditions: '{{ screen|int == 1 and item|int == 2 }}'
      sequence:
      - service: script.shield_open_plex
    - conditions: '{{ screen|int == 1 and item|int == 3 }}'
      sequence:
      - service: script.shield_open_netflix
    - conditions: '{{ screen|int == 1 and item|int == 4 }}'
      sequence:
      - service: script.shield_open_disney_plus
    - conditions: '{{ screen|int == 1 and item|int == 5 }}'
      sequence:
      - service: script.shield_open_prime_video
    - conditions: '{{ screen|int == 1 and item|int == 6 }}'
      sequence:
      - service: script.shield_open_apple_tv
    - conditions: '{{ screen|int == 1 and item|int == 7 }}'
      sequence:
      - service: script.shield_open_hulu
    - conditions: '{{ screen|int == 1 and item|int == 8 }}'
      sequence:
      - service: script.shield_open_max
    - conditions: '{{ screen|int == 1 and item|int == 9 }}'
      sequence:
      - service: script.shield_open_jellyfin
    - conditions: '{{ screen|int == 2 and item|int == 0 }}'
      sequence:
      - service: script.speakeasy_music_viz
    - conditions: '{{ screen|int == 2 and item|int == 1 }}'
      sequence:
      - service: script.shield_open_spotify
    - conditions: '{{ screen|int == 2 and item|int == 2 }}'
      sequence:
      - service: script.shield_open_youtube
    - conditions: '{{ screen|int == 3 and item|int == 0 }}'
      sequence:
      - service: script.speakeasy_retro
    - conditions: '{{ screen|int == 3 and item|int == 1 }}'
      sequence:
      - service: script.shield_open_steam_link
    - conditions: '{{ screen|int == 4 and item|int == 0 }}'
      sequence:
      - service: script.speakeasy_pc_stream
    - conditions: '{{ screen|int == 4 and item|int == 1 }}'
      sequence:
      - service: script.shield_open_steam_link
