shield_launch_app:
  alias: 'Shield: Launch app (waking if needed)'
  icon: mdi:application
  fields:
    package:
      description: Android package name (e.g. com.netflix.ninja)
      required: true
      example: com.netflix.ninja
  sequence:
  - service: shell_command.py_shield_launch_app
    data:
      package: '{{ package }}'
shield_open_netflix:
  alias: 'Shield: Open Netflix'
  icon: mdi:netflix
  sequence:
  - service: shell_command.py_shield_open
    data:
