      description: Title to search on Stremio (movie or series)
      required: true
      example: Spider-Man
  sequence:
  - service: shell_command.py_shield_stremio_search
    data:
      query: '{{ query }}'
shield_stremio_play:
  alias: 'Shield: Open in Stremio (best-match detail page)'
  icon: mdi:movie-play
  fields:
    query:
      description: Movie or series title — opens the detail page in Stremio. You still
        pick a stream + press Play.
      required: true
      example: The Big Lebowski
  sequence:
